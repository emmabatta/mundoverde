        function calcularTotales() {
            const trabajosActivos = activos(estado.trabajos);
            const pagosActivos = activos(estado.pagosTractoristas);
            const total = trabajosActivos.reduce((s, t) => {
                const cantidad = isNaN(t.cantidad) ? 0 : t.cantidad;
                const precio = isNaN(t.precio) ? 0 : t.precio;
                // Para "Otra actividad", usar precio directamente sin multiplicar
                const monto = t.actividad === 'Otra actividad' ? precio : (cantidad * precio);
                return s + monto;
            }, 0);
            const emmaPagado = pagosActivos.filter(p => p.pagador === 'Emma').reduce((s, p) => s + (isNaN(p.monto) ? 0 : p.monto), 0);
            const pabloPagado = pagosActivos.filter(p => p.pagador === 'Pablo').reduce((s, p) => s + (isNaN(p.monto) ? 0 : p.monto), 0);
            
            return {
                total,
                emmaPagado,
                pabloPagado,
                emmaDebe: (total / 2) - emmaPagado,
                pabloDebe: (total / 2) - pabloPagado
            };
        }

        function calcularPorTractorista(nombre) {
            const trabajos = activos(estado.trabajos).filter(t => t.tractorista === nombre);
            const trabajado = trabajos.reduce((s, t) => {
                const cantidad = isNaN(t.cantidad) ? 0 : t.cantidad;
                const precio = isNaN(t.precio) ? 0 : t.precio;
                // Para "Otra actividad", usar precio directamente sin multiplicar
                const monto = t.actividad === 'Otra actividad' ? precio : (cantidad * precio);
                return s + monto;
            }, 0);
            const pagos = activos(estado.pagosTractoristas).filter(p => p.tractorista === nombre);
            const pagado = pagos.reduce((s, p) => s + (isNaN(p.monto) ? 0 : p.monto), 0);
            const emmaPago = pagos.filter(p => p.pagador === 'Emma').reduce((s, p) => s + (isNaN(p.monto) ? 0 : p.monto), 0);
            const pabloPago = pagos.filter(p => p.pagador === 'Pablo').reduce((s, p) => s + (isNaN(p.monto) ? 0 : p.monto), 0);
            
            return {
                trabajado,
                pagado,
                pendiente: trabajado - pagado,
                emmaDebe: (trabajado / 2) - emmaPago,
                pabloDebe: (trabajado / 2) - pabloPago
            };
        }

            if (pendientes.length === 0) {
                // Todos al día → card verde

                    valor.innerHTML = '—';

                    valor.innerHTML = '✅ Al día';
                    valor.style.fontSize = '18px';
                    sub.textContent = 'Todos los tractoristas cobrados';

                return;
            }

            // Hay pendientes → card naranja
            card.classList.remove('orange-ok');

            const total = pendientes.reduce((s, t) => s + t.pendiente, 0);

        // ===== FUNCIÓN DE ORDENAMIENTO POR FECHA (descendente: más reciente primero) =====
        // El orden se elige así porque para uso diario es más útil ver primero lo que se cargó hoy.
        function ordenarPorFecha(registros) {
            if (!registros || registros.length === 0) return registros;
            const copia = [...registros];

            // Convertir a fecha (timestamp) tolerando formatos raros (Date, string, número de Excel)
            const toMs = (v) => {
                if (!v && v !== 0) return null;
                if (v instanceof Date) return isNaN(v.getTime()) ? null : v.getTime();
                if (typeof v === 'number') {
                    // Heurística: número de serie Excel (días desde 1900)
                    if (v > 25000 && v < 80000) {
                        return (v - 25569) * 86400 * 1000;
                    }
                    return v;
                }
                if (typeof v === 'string') {
                    const t = Date.parse(v) || Date.parse(v + 'T00:00:00');
                    return isNaN(t) ? null : t;
                }
                return null;
            };

            // Ordenar por fecha descendente; si no hay fecha, por id (timestamp de creación) descendente
            copia.sort((a, b) => {
                const fa = toMs(a.fecha);
                const fb = toMs(b.fecha);
                if (fa !== null && fb !== null) return fb - fa;
                if (fa !== null) return -1;
                if (fb !== null) return 1;
                return (b.id || 0) - (a.id || 0);
            });

            return copia;
        }

        // Normalizar fecha de un registro a string YYYY-MM-DD (defensa para imports de Excel)
        function normalizarFecha(v) {
            if (!v) return '';
            if (v instanceof Date && !isNaN(v.getTime())) {
                return v.toISOString().split('T')[0];
            }
            if (typeof v === 'number') {
                let ms;
                if (v > 25000 && v < 80000) ms = (v - 25569) * 86400 * 1000;
                else ms = v;
                const d = new Date(ms);
                return isNaN(d.getTime()) ? '' : d.toISOString().split('T')[0];
            }
            if (typeof v === 'string') {
                // Si ya viene en formato ISO YYYY-MM-DD, dejarlo
                if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
                const t = Date.parse(v);
                if (!isNaN(t)) return new Date(t).toISOString().split('T')[0];
                return v; // Devolver tal cual, formatearFecha tendrá manejo defensivo
            }
            return '';
        }

        async function agregarTrabajo() {
            // Validar precondiciones
            if (estado.lotes.length === 0) {
                showToast('Primero agregá un lote en "Lotes & Config"', 'warning');
                return;
            }
            if (estado.tractoristas.length === 0) {
                showToast('Primero agregá un tractorista en "Lotes & Config"', 'warning');
                return;
            }

            const loteId = parseInt(document.getElementById('t-lote').value);
            const lote = estado.lotes.find(l => l.id === loteId);
            if (!lote) {
                showToast('Seleccioná un lote válido', 'error');
                return;
            }

            const fecha = document.getElementById('t-fecha').value;
            const tractorista = document.getElementById('t-tractorista').value;
            const actividad = document.getElementById('t-actividad').value;
            const cantidad = parseFloat(document.getElementById('t-cantidad').value);
            const precio = parseFloat(document.getElementById('t-precio').value);

            if (!fecha) {
                showToast('Ingresá una fecha', 'warning');
                return;
            }
            if (!tractorista) {
                showToast('Seleccioná un tractorista', 'warning');
                return;
            }
            if (!actividad) {
                showToast('Seleccioná una actividad', 'warning');
                return;
            }

            // Para "Otra actividad" la cantidad se fuerza a 1 y el precio es el monto total (debe ser > 0)
            if (actividad === 'Otra actividad') {
                if (isNaN(precio) || precio <= 0) {
                    showToast('Ingresá un monto mayor a 0', 'warning');
                    return;
                }
            } else {
                if (isNaN(cantidad) || cantidad <= 0) {
                    showToast('Ingresá una cantidad mayor a 0', 'warning');
                    return;
                }
                if (isNaN(precio) || precio <= 0) {
                    showToast('Ingresá un precio mayor a 0', 'warning');
                    return;
                }
            }

            const trabajo = {
                id: Date.now(),
                fecha: fecha,
                tractorista: tractorista,
                lote: lote.nombre,
                actividad: actividad,
                cantidad: actividad === 'Otra actividad' ? 1 : cantidad,
                precio: precio,
                notas: document.getElementById('t-notas').value.trim(),
                cargadoPor: obtenerUsuarioActivo(),
                creadoEn: Date.now()
            };

            estado.trabajos.push(trabajo);
            await guardar();
            document.getElementById('t-notas').value = '';
            document.getElementById('t-cantidad').value = '';
            renderizar();
            showToast('Trabajo registrado', 'success', 2000);
        }

        // ===== FUNCIONES PARA RESUMEN =====
        function calcularResumenGeneral() {
            const porActividad = {};
            let totalHectareas = 0;
            let totalRollos = 0;
            let totalDinero = 0;
            
            // Inicializar actividades
            estado.actividades.forEach(act => {
                porActividad[act.nombre] = { cantidad: 0, monto: 0 };
            });

            // Calcular por trabajo (solo activos, no eliminados)
            activos(estado.trabajos).forEach(t => {
                const cantidad = isNaN(t.cantidad) ? 0 : t.cantidad;
                const precio = isNaN(t.precio) ? 0 : t.precio;
                const monto = t.actividad === 'Otra actividad' ? precio : (cantidad * precio);
                
                if (!porActividad[t.actividad]) {
                    porActividad[t.actividad] = { cantidad: 0, monto: 0 };
                }
                
                // Solo sumar cantidades si NO es "Otra actividad"
                if (t.actividad !== 'Otra actividad') {
                    porActividad[t.actividad].cantidad += cantidad;
                    
                    // Sumar hectáreas solo para actividades que no sean Rollos
                    if (t.actividad !== 'Rollos') {
                        totalHectareas += cantidad;
                    }
                    
                    // Sumar rollos solo para la actividad Rollos
                    if (t.actividad === 'Rollos') {
                        totalRollos += cantidad;
                    }
                }
                
                porActividad[t.actividad].monto += monto;
                totalDinero += monto;
            });
            
            const totales = calcularTotales();
            
            return {
                porActividad,
                totalHectareas: totalHectareas.toFixed(2),
                totalRollos: Math.round(totalRollos),
                totalDinero,
                totalPagado: totales.emmaPagado + totales.pabloPagado
            };
        }

        // ===== FUNCIONES PARA BALANCE EMMA-PABLO =====
        function calcularBalanceCompleto() {
            const totales = calcularTotales();
            
            // Calcular gastos generales (solo activos)
            const gastosActivos = activos(estado.gastosGenerales);
            const gastosEmma = gastosActivos.filter(g => g.pagador === 'Emma').reduce((s, g) => s + (isNaN(g.monto) ? 0 : g.monto), 0);
            const gastosPablo = gastosActivos.filter(g => g.pagador === 'Pablo').reduce((s, g) => s + (isNaN(g.monto) ? 0 : g.monto), 0);

            // Calcular pagos entre Emma y Pablo (solo activos)
            const balanceActivos = activos(estado.pagosEntreEmmaYPablo);
            const pagosEmmaAPablo = balanceActivos.filter(p => p.pagador === 'Emma').reduce((s, p) => s + (isNaN(p.monto) ? 0 : p.monto), 0);
            const pagosPabloAEmma = balanceActivos.filter(p => p.pagador === 'Pablo').reduce((s, p) => s + (isNaN(p.monto) ? 0 : p.monto), 0);
            
            // Total que gastó cada uno (sin contar pagos entre ellos)
            const totalGastadoEmma = totales.emmaPagado + gastosEmma;
            const totalGastadoPablo = totales.pabloPagado + gastosPablo;
            
            // Diferencia de gastos
            const diferenciaGastos = totalGastadoEmma - totalGastadoPablo;
            
            // Monto que uno debe pagarle al otro para equilibrar 50/50
            // Si positivo: Pablo debe a Emma
            // Si negativo: Emma debe a Pablo
            const debeEquilibrar = diferenciaGastos / 2;
            
            // Saldo neto de pagos entre ellos
            const saldoPagos = pagosPabloAEmma - pagosEmmaAPablo;
            
            // Diferencia final (cuánto falta para estar equilibrados)
            const diferenciaFinal = debeEquilibrar - saldoPagos;
            
            return {
                emma: {
                    pagosTractoristas: totales.emmaPagado,
                    gastos: gastosEmma,
                    debePagar: totales.emmaDebe,
                    totalGastado: totalGastadoEmma
                },
                pablo: {
                    pagosTractoristas: totales.pabloPagado,
                    gastos: gastosPablo,
                    debePagar: totales.pabloDebe,
                    totalGastado: totalGastadoPablo
                },
                diferencia: diferenciaFinal,
                montoParaEquilibrar: Math.abs(diferenciaFinal),
                pagosEmmaAPablo: pagosEmmaAPablo,
                pagosPabloAEmma: pagosPabloAEmma
            };
        }

        // ===== FUNCIÓN PARA IMPORTAR DESDE EXCEL =====
        async function importarDesdeExcel() {
            // 1. CONFIRMACIÓN: la importación reemplaza datos. Pedir OK explícito.
            const ok = await confirmarModal(
                'Esta acción REEMPLAZA los datos actuales con los del Excel.\n\nAntes de hacerlo se va a guardar una versión de respaldo de los datos actuales (podés restaurarla desde "🔄 Restaurar").\n\n¿Continuar?',
                { titulo: '⚠️ Importar Excel', confirmar: 'Sí, importar', peligroso: true }
            );
            if (!ok) return;

            // 2. BACKUP de los datos actuales antes de tocar nada
            try {
                await guardarVersion({
                    trabajos: estado.trabajos,
                    pagosTractoristas: estado.pagosTractoristas,
                    gastosGenerales: estado.gastosGenerales,
                    pagosEntreEmmaYPablo: estado.pagosEntreEmmaYPablo,
                    lotes: estado.lotes,
                    tractoristas: estado.tractoristas,
                    actividades: estado.actividades
                });
                console.log('✅ Backup guardado antes de importar');
            } catch (e) {
                console.error('Error guardando backup pre-import:', e);
                showToast('No se pudo guardar el backup previo. Importación cancelada.', 'error', 5000);
                return;
            }

            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.xlsx, .xls';

            input.onchange = async function(e) {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const workbook = new ExcelJS.Workbook();
                    await workbook.xlsx.load(arrayBuffer);

                    // Helper: ExcelJS a veces devuelve celdas con texto rico {richText:[...]} u objetos {result:...}
                    const cellToString = (v) => {
                        if (v === null || v === undefined) return '';
                        if (typeof v === 'string') return v.trim();
                        if (typeof v === 'number') return String(v);
                        if (v instanceof Date) return v.toISOString().split('T')[0];
                        if (typeof v === 'object') {
                            if (v.text) return String(v.text).trim();
                            if (v.result !== undefined) return String(v.result).trim();
                            if (v.richText) return v.richText.map(r => r.text).join('').trim();
                            if (v.hyperlink) return String(v.hyperlink).trim();
                        }
                        return String(v).trim();
                    };
                    const cellToNumber = (v) => {
                        if (v === null || v === undefined || v === '') return 0;
                        if (typeof v === 'number') return v;
                        if (typeof v === 'object' && v.result !== undefined) return parseFloat(v.result) || 0;
                        const s = cellToString(v).replace(/[^\d.,-]/g, '').replace(/\./g, '').replace(',', '.');
                        return parseFloat(s) || 0;
                    };

                    let cambios = 0;
                    let baseId = Date.now();

                    // IMPORTAR TRABAJOS
                    const wsTrabajos = workbook.getWorksheet('Trabajos');
                    if (wsTrabajos) {
                        const nuevosTrabajos = [];
                        wsTrabajos.eachRow((row, rowNumber) => {
                            if (rowNumber <= 3) return;
                            const values = row.values;
                            if (!values[1]) return;
                            if (cellToString(values[6]) === 'TOTAL:') return;

                            const trabajo = {
                                id: baseId++,
                                fecha: normalizarFecha(values[1]),
                                tractorista: cellToString(values[2]),
                                lote: cellToString(values[3]),
                                actividad: cellToString(values[4]),
                                cantidad: cellToString(values[5]) === '-' ? 1 : cellToNumber(values[5]),
                                precio: cellToNumber(values[6]),
                                notas: cellToString(values[8])
                            };
                            if (trabajo.tractorista || trabajo.actividad) {
                                nuevosTrabajos.push(trabajo);
                                cambios++;
                            }
                        });
                        estado.trabajos = nuevosTrabajos;
                    }

                    // IMPORTAR PAGOS
                    const wsPagos = workbook.getWorksheet('Pagos Tractoristas');
                    if (wsPagos) {
                        const nuevosPagos = [];
                        wsPagos.eachRow((row, rowNumber) => {
                            if (rowNumber <= 3) return;
                            const values = row.values;
                            if (!values[1]) return;
                            if (cellToString(values[3]) === 'TOTAL:') return;

                            const pago = {
                                id: baseId++,
                                fecha: normalizarFecha(values[1]),
                                tractorista: cellToString(values[2]),
                                pagador: cellToString(values[3]) || 'Emma',
                                monto: cellToNumber(values[4]),
                                concepto: cellToString(values[5])
                            };
                            if (pago.tractorista) {
                                nuevosPagos.push(pago);
                                cambios++;
                            }
                        });
                        estado.pagosTractoristas = nuevosPagos;
                    }

                    // IMPORTAR GASTOS
                    const wsGastos = workbook.getWorksheet('Gastos Generales');
                    if (wsGastos) {
                        const nuevosGastos = [];
                        wsGastos.eachRow((row, rowNumber) => {
                            if (rowNumber <= 3) return;
                            const values = row.values;
                            if (!values[1]) return;
                            if (cellToString(values[3]) === 'TOTAL:') return;

                            const gasto = {
                                id: baseId++,
                                fecha: normalizarFecha(values[1]),
                                concepto: cellToString(values[2]),
                                pagador: cellToString(values[3]) || 'Emma',
                                monto: cellToNumber(values[4]),
                                detalle: cellToString(values[5])
                            };
                            if (gasto.concepto) {
                                nuevosGastos.push(gasto);
                                cambios++;
                            }
                        });
                        estado.gastosGenerales = nuevosGastos;
                    }

                    // IMPORTAR BALANCE EMMA-PABLO
                    const wsBalance = workbook.getWorksheet('Balance Emma-Pablo');
                    if (wsBalance) {
                        const nuevosBalance = [];
                        wsBalance.eachRow((row, rowNumber) => {
                            if (rowNumber <= 3) return;
                            const values = row.values;
                            if (!values[1]) return;
                            if (cellToString(values[3]) === 'TOTAL:') return;

                            const balance = {
                                id: baseId++,
                                fecha: normalizarFecha(values[1]),
                                pagador: cellToString(values[2]) || 'Emma',
                                monto: cellToNumber(values[4]),
                                concepto: cellToString(values[5])
                            };
                            if (balance.pagador) {
                                nuevosBalance.push(balance);
                                cambios++;
                            }
                        });
                        estado.pagosEntreEmmaYPablo = nuevosBalance;
                    }

                    await guardar();
                    renderizar();

                    showToast('Importación exitosa: ' + cambios + ' registros cargados', 'success', 4000);

                } catch (error) {
                    console.error('Error al importar:', error);
                    showToast('Error al importar. Verificá que el archivo sea un Excel exportado desde MundoVerde. Tus datos previos quedaron a salvo en una versión de backup.', 'error', 8000);
                }
            };

            input.click();
        }

        // ===== DETECCIÓN DE CONEXIÓN Y SINCRONIZACIÓN =====
        let isOnline = navigator.onLine;
        let firebaseRealmenteConectado = false;
        
        function updateConnectionStatus() {
            const statusEl = document.getElementById('connection-status');
            const textEl = document.getElementById('connection-text');

            if (!statusEl || !textEl) return;

            const esArchivoLocal = window.location.protocol === 'file:';

            if (!navigator.onLine) {
                statusEl.className = 'connection-status offline';
                textEl.textContent = pendingSyncOnReconnect ? 'Sin conexión (cambios pendientes)' : 'Sin conexión';
                firebaseRealmenteConectado = false;
                console.log('🔴 Sin conexión a internet');
            } else if (esArchivoLocal) {
                statusEl.className = 'connection-status local';
                textEl.textContent = 'Modo Local (archivo)';
                firebaseRealmenteConectado = false;
                console.log('🟡 Modo Local - Archivo abierto desde el disco');
            } else {
                if (firebaseIniciado && db) {
                    statusEl.className = 'connection-status online';
                    textEl.textContent = pendingSyncOnReconnect ? 'Sincronizando...' : 'En línea';
                    firebaseRealmenteConectado = true;
                    console.log('🟢 En línea - Firebase conectado');
                } else {
                    statusEl.className = 'connection-status local';
                    textEl.textContent = 'Modo Local';
                    firebaseRealmenteConectado = false;
                    console.log('🟡 Modo Local - Firebase no disponible');
                }
            }
            actualizarBadgePendientes();
        }
        
        // Detectar cambios de conexión y sincronizar la cola pendiente al reconectar
        window.addEventListener('online', async () => {
            console.log('🌐 Conexión restaurada');
            isOnline = true;
            updateConnectionStatus();
            showToast('Conexión restaurada — sincronizando datos...', 'info', 3000);

            // Esperar un poco para que la red esté realmente lista, luego sincronizar
            setTimeout(async () => {
                if (firebaseIniciado && db) {
                    try {
                        await sincronizarConFirebase();
                        if (pendingSyncOnReconnect) {
                            pendingSyncOnReconnect = false;
                            actualizarBadgePendientes();
                            showToast('Datos sincronizados con la nube', 'success', 2500);
